name: Buffett Stock Screener

on:
  schedule:
    # Runs every weekday at 6PM UTC (after US market close)
    - cron: "0 18 * * 1-5"
  workflow_dispatch: # Allow manual trigger from GitHub

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screener.py --file tickers.txt --csv results.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screener-results
          path: results.csv
          retention-days: 30

      - name: Update results in repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results.csv
          git diff --cached --quiet || git commit -m "Update screener results $(date -u +%Y-%m-%d)"
          git push
